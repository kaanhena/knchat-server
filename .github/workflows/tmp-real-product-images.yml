name: Temporary Real Product Image Export

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tmp-real-image-job/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install image dependencies
        run: python -m pip install --disable-pip-version-check requests pillow pymupdf

      - name: Download actual product photographs
        working-directory: tmp-real-image-job
        shell: bash
        run: |
          set +e
          python build_real_images.py 2>&1 | tee run.log
          exit 0

      - name: Upload image export and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: klimahesapla-114-gercek-klima-gorselleri-debug
          path: |
            tmp-real-image-job/real_product_images/
            tmp-real-image-job/run.log
          if-no-files-found: warn
          compression-level: 6
          retention-days: 1
